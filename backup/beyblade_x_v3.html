];
const RATCHETS=[
  {id:"r3",name:"3-60",sub:"標準齒輪",teeth:3,color:"#888780",accent:"#D3D1C7",weight:8.3,atk:5,def:10,dur:5,price:0,hot:false},
  {id:"r4",name:"4-70",sub:"重型加防",teeth:4,color:"#3C3489",accent:"#CECBF6",weight:10.1,atk:8,def:15,dur:8,price:0,hot:false},
  {id:"r5",name:"5-80",sub:"平衡型",teeth:5,color:"#0F6E56",accent:"#9FE1CB",weight:9.5,atk:10,def:10,dur:10,price:0,hot:false},

];
const BITS=[
  {id:"pointBit",name:"Point",sub:"尖型・萬用",color:"#888780",accent:"#D3D1C7",shape:"point",weight:5.2,atk:5,def:5,dur:10,price:0,hot:false},
  {id:"flatBit",name:"Flat",sub:"平型・攻擊",color:"#D85A30",accent:"#F5C4B3",shape:"flat",weight:5.0,atk:15,def:0,dur:5,price:0,hot:false},
  {id:"ballBit",name:"Ball",sub:"球型・防禦",color:"#185FA5",accent:"#B5D4F4",shape:"ball",weight:5.5,atk:5,def:15,dur:5,price:0,hot:false},
  {id:"rushBit",name:"Rush",sub:"衝刺・爆發",color:"#BA7517",accent:"#FAC775",shape:"rush",weight:4.8,atk:20,def:0,dur:0,price:0,hot:false},
  {id:"unitBit",name:"Unit",sub:"持久・穩定",color:"#1D9E75",accent:"#9FE1CB",shape:"unit",weight:5.1,atk:0,def:10,dur:20,price:0,hot:false},
];

let selB=0,selR=0,selBit=0;
let angle=0.3,tiltX=0.42,zoom=1,spinning=true;
let viewMode="full",explodeT=0,explodeDir=1;
let dragStart=null,dragAngle=0,dragTilt=0;

const canvas=document.getElementById("c3d");
const ctx=canvas.getContext("2d");
const W=canvas.width,H=canvas.height,CX=W/2,CY=H/2-10;

function drawPartThumb(c,part,type,size){
  const w=size,h=size,cx=w/2,cy=h/2;
  c.clearRect(0,0,w,h);
  c.fillStyle="#18181f";
  c.beginPath();c.roundRect(0,0,w,h,5);c.fill();
  const a=Date.now()*0.002;
  if(type==="blade"){
    const OR=size*0.42*part.sharp,IR=size*0.15,n=part.bc;
    for(let i=0;i<n;i++){
      const a0=a+(i/n)*Math.PI*2,a1=a0+part.sw*Math.PI*2/n;
      c.beginPath();
      const s=10;
      for(let k=0;k<=s;k++){
        const ang=a0+k*(a1-a0)/s,r=IR+(OR-IR)*(k/s);
        if(k===0) c.moveTo(cx+Math.cos(ang)*r,cy+Math.sin(ang)*r);
        else c.lineTo(cx+Math.cos(ang)*r,cy+Math.sin(ang)*r);
      }
      for(let k=s;k>=0;k--){
        const ang=a0+k*(a1-a0)/s,r=(IR+(OR-IR)*(k/s))*0.5;
        c.lineTo(cx+Math.cos(ang)*r,cy+Math.sin(ang)*r);
      }
      c.closePath();
      const g=c.createLinearGradient(cx-OR,cy-OR,cx+OR,cy+OR);
      g.addColorStop(0,part.accent);g.addColorStop(1,part.color);
      c.fillStyle=g;c.fill();
    }
    c.beginPath();c.arc(cx,cy,size*0.1,0,Math.PI*2);c.fillStyle="#fff";c.fill();
  } else if(type==="ratchet"){
    const n=part.teeth,OR=size*0.42,IR=size*0.28;
    c.beginPath();
    for(let i=0;i<n*2;i++){
      const ang=a+(i/(n*2))*Math.PI*2;
      const r=(i%2===0)?OR:IR;
      const x=cx+Math.cos(ang)*r,y=cy+Math.sin(ang)*r;
      if(i===0) c.moveTo(x,y); else c.lineTo(x,y);
    }
    c.closePath();
    const g=c.createRadialGradient(cx,cy,IR*0.3,cx,cy,OR);
    g.addColorStop(0,part.accent);g.addColorStop(1,part.color);
    c.fillStyle=g;c.fill();
    c.beginPath();c.arc(cx,cy,size*0.12,0,Math.PI*2);c.fillStyle=part.color;c.fill();
  } else {
    const sh=part.shape,topR=size*0.22,botR=sh==="flat"?size*0.2:size*0.08;
    const pts=[];const S=12;
    for(let i=0;i<=S;i++){
      const t=i/S;
      let r;
      if(sh==="point") r=topR*(1-t*0.88);
      else if(sh==="flat") r=topR*(1-t*0.15);
      else if(sh==="ball") r=topR*Math.sin(t*Math.PI*0.85+0.1);
      else if(sh==="rush") r=topR*(1-t*0.82);
      else r=topR*(0.45+0.55*Math.cos(t*Math.PI));
      pts.push({x:cx+r,y:cy-size*0.35+t*size*0.7,r});
    }
    c.beginPath();
    c.moveTo(pts[0].x,pts[0].y);
    pts.forEach(p=>c.lineTo(p.x,p.y));
    for(let i=pts.length-1;i>=0;i--) c.lineTo(cx-pts[i].r,pts[i].y);
    c.closePath();
    const g=c.createLinearGradient(cx-topR,0,cx+topR,h);
    g.addColorStop(0,part.accent);g.addColorStop(1,part.color);
    c.fillStyle=g;c.fill();
    c.beginPath();c.arc(cx,cy+size*0.3,size*0.05,0,Math.PI*2);c.fillStyle="#fff";c.fill();
  }
}

function makeIconCanvas(part,type,size){
  const c=document.createElement("canvas");
  c.width=c.height=size;
  c.dataset.part=JSON.stringify({type,idx:part.id});
  drawPartThumb(c.getContext("2d"),part,type,size);
  return c;
}

let thumbAnims=[];
function startThumbAnim(){
  cancelAnimationFrame(startThumbAnim._id);
  function tick(){
    thumbAnims.forEach(({c,part,type,size})=>{
      drawPartThumb(c.getContext("2d"),part,type,size);
    });
    startThumbAnim._id=requestAnimationFrame(tick);
  }
  tick();
}

function buildDropdown(containerId,parts,type,selIdx,onSelect){
  const container=document.getElementById(containerId);
  thumbAnims=thumbAnims.filter(t=>t.containerId!==containerId);

  const trigger=document.createElement("div");
  trigger.className="sel-trigger";
  const iconC=makeIconCanvas(parts[selIdx],type,32);
  thumbAnims.push({c:iconC,part:parts[selIdx],type,size:32,containerId,isTrigger:true});
  const iconWrap=document.createElement("div");iconWrap.className="sel-icon";iconWrap.appendChild(iconC);
  const textDiv=document.createElement("div");textDiv.className="sel-text";
  textDiv.innerHTML=`<div class="sel-name">${parts[selIdx].name}</div><div class="sel-sub">${parts[selIdx].sub}</div>`;
  const arrow=document.createElement("i");arrow.className="ti ti-chevron-down sel-arrow";arrow.setAttribute("aria-hidden","true");
  trigger.appendChild(iconWrap);trigger.appendChild(textDiv);trigger.appendChild(arrow);

  const dropdown=document.createElement("div");
  dropdown.className="dropdown";
  parts.forEach((p,i)=>{
    const opt=document.createElement("div");
    opt.className="dopt"+(i===selIdx?" active":"");
    const ic=makeIconCanvas(p,type,36);
    thumbAnims.push({c:ic,part:p,type,size:36,containerId});
    const iw=document.createElement("div");iw.className="dopt-icon";iw.appendChild(ic);
    const td=document.createElement("div");td.className="dopt-text";
    td.innerHTML=`<div class="dopt-name">${p.name}</div><div class="dopt-sub">${p.sub}</div>`;
    opt.appendChild(iw);opt.appendChild(td);
    if(p.hot){const b=document.createElement("span");b.className="dopt-badge hot-badge";b.textContent="熱門";opt.appendChild(b);}
    const wb=document.createElement("span");wb.className="dopt-badge wt-badge";wb.textContent=p.weight+"g";opt.appendChild(wb);
    opt.addEventListener("click",()=>{
      dropdown.classList.remove("open");arrow.classList.remove("open");
      onSelect(i);
    });
    dropdown.appendChild(opt);
  });

  trigger.addEventListener("click",e=>{
    e.stopPropagation();
    const isOpen=dropdown.classList.contains("open");
    document.querySelectorAll(".dropdown.open").forEach(d=>d.classList.remove("open"));
    document.querySelectorAll(".sel-arrow.open").forEach(a=>a.classList.remove("open"));
    if(!isOpen){dropdown.classList.add("open");arrow.classList.add("open");}
  });

  container.innerHTML="";
  container.appendChild(trigger);
  container.appendChild(dropdown);
}

document.addEventListener("click",()=>{
  document.querySelectorAll(".dropdown.open").forEach(d=>d.classList.remove("open"));
  document.querySelectorAll(".sel-arrow.open").forEach(a=>a.classList.remove("open"));
});

<!-- 3D繪圖核心將 3D空間座標轉換為 2D螢幕畫布的關鍵。 -->
function proj(x,y,z){
  const cA=Math.cos(angle),sA=Math.sin(angle);
  const cT=Math.cos(tiltX),sT=Math.sin(tiltX);
  const rx=x*cA-z*sA,rz=x*sA+z*cA;
  const ry2=y*cT-rz*sT,rz2=y*sT+rz*cT;
  const d=500,sc=zoom*d/(d+rz2);
  return{px:CX+rx*sc,py:CY+ry2*sc};
}
function drawBlade(b,oy){
  const OR=zoom*58*b.sharp,IR=zoom*22,HH=zoom*11,n=b.bc;
  for(let i=0;i<n;i++){
    const a0=angle+(i/n)*Math.PI*2,a1=a0+b.sw*Math.PI*2/n;
    const pts=[],S=14;
    for(let s=0;s<=S;s++){const a=a0+s*(a1-a0)/S,r=IR+(OR-IR)*(s/S),p=proj(Math.cos(a)*r,oy-HH*.4,Math.sin(a)*r);pts.push(p);}
    for(let s=S;s>=0;s--){const a=a0+s*(a1-a0)/S,r=(IR+(OR-IR)*(s/S))*.55,p=proj(Math.cos(a)*r,oy+HH*.4,Math.sin(a)*r);pts.push(p);}
    ctx.beginPath();ctx.moveTo(pts[0].px,pts[0].py);
    pts.forEach(p=>ctx.lineTo(p.px,p.py));ctx.closePath();
    const g=ctx.createLinearGradient(CX-OR,CY-OR,CX+OR,CY+OR);
    g.addColorStop(0,b.accent);g.addColorStop(1,b.color);
    ctx.fillStyle=g;ctx.fill();ctx.strokeStyle=b.color+"99";ctx.lineWidth=.6;ctx.stroke();
  }
  const tc=proj(0,oy,0);
  ctx.beginPath();ctx.ellipse(tc.px,tc.py,zoom*15,zoom*15*Math.abs(Math.cos(tiltX)),0,0,Math.PI*2);
  const cg=ctx.createRadialGradient(tc.px,tc.py,2,tc.px,tc.py,zoom*15);
  cg.addColorStop(0,"#fff");cg.addColorStop(1,b.accent);
  ctx.fillStyle=cg;ctx.fill();ctx.strokeStyle=b.color;ctx.lineWidth=.7;ctx.stroke();
}
function drawRatchet(r,oy){
  const n=r.teeth,OR=zoom*40,IR=zoom*26,H2=zoom*8;
  ctx.beginPath();
  for(let i=0;i<n*2;i++){const a=angle+(i/(n*2))*Math.PI*2,rr=(i%2===0)?OR:IR;const p=proj(Math.cos(a)*rr,oy+H2*.4,Math.sin(a)*rr);if(i===0) ctx.moveTo(p.px,p.py);else ctx.lineTo(p.px,p.py);}
  ctx.closePath();ctx.fillStyle=r.accent+"66";ctx.fill();ctx.strokeStyle=r.color;ctx.lineWidth=.5;ctx.stroke();
  ctx.beginPath();
  for(let i=0;i<n*2;i++){const a=angle+(i/(n*2))*Math.PI*2,rr=(i%2===0)?OR:IR;const p=proj(Math.cos(a)*rr,oy-H2*.5,Math.sin(a)*rr);if(i===0) ctx.moveTo(p.px,p.py);else ctx.lineTo(p.px,p.py);}
  ctx.closePath();
  const g=ctx.createRadialGradient(CX,CY,OR*.2,CX,CY,OR);
  g.addColorStop(0,r.accent);g.addColorStop(1,r.color);
  ctx.fillStyle=g;ctx.fill();ctx.strokeStyle=r.color+"88";ctx.lineWidth=.5;ctx.stroke();
  const cc=proj(0,oy,0);
  ctx.beginPath();ctx.ellipse(cc.px,cc.py,zoom*11,zoom*11*Math.abs(Math.cos(tiltX)),0,0,Math.PI*2);ctx.fillStyle=r.color;ctx.fill();
}
function drawBit(bt,oy){
  const topR=zoom*19,H2=zoom*50,sh=bt.shape,S=18;
  const lp=[],rp=[];
  for(let i=0;i<=S;i++){
    const t=i/S;let r;
    if(sh==="point") r=topR*(1-t*.88);
    else if(sh==="flat") r=topR*(1-t*.15);
    else if(sh==="ball") r=topR*Math.sin(t*Math.PI*.85+.1);
    else if(sh==="rush") r=topR*(1-t*.82);
    else r=topR*(.45+.55*Math.cos(t*Math.PI));
    const y=oy-H2*.5+t*H2;
    lp.push(proj(Math.cos(angle)*r,y,Math.sin(angle)*r));
    rp.push(proj(Math.cos(angle+Math.PI)*r,y,Math.sin(angle+Math.PI)*r));
  }
  ctx.beginPath();ctx.moveTo(lp[0].px,lp[0].py);
  lp.forEach(p=>ctx.lineTo(p.px,p.py));
  for(let i=rp.length-1;i>=0;i--) ctx.lineTo(rp[i].px,rp[i].py);
  ctx.closePath();
  const g=ctx.createLinearGradient(CX-topR,CY-H2*.4,CX+topR,CY+H2*.4);
  g.addColorStop(0,bt.accent);g.addColorStop(1,bt.color);
  ctx.fillStyle=g;ctx.fill();ctx.strokeStyle=bt.color;ctx.lineWidth=.7;ctx.stroke();
  const tip=proj(0,oy+H2*.5,0);
  ctx.beginPath();ctx.arc(tip.px,tip.py,zoom*3.5,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();
}
function drawFrame(){
  ctx.clearRect(0,0,W,H);
  const b=BLADES[selB],r=RATCHETS[selR],bt=BITS[selBit];
  let by,ry,bity;
  if(viewMode==="explode"){
    by=-zoom*(26+explodeT*36);ry=zoom*2;bity=zoom*(22+explodeT*36);
  } else {by=-zoom*26;ry=zoom*2;bity=zoom*22;}
  const sc=proj(0,38*zoom,0);
  ctx.beginPath();ctx.ellipse(sc.px,sc.py,zoom*55,zoom*10,0,0,Math.PI*2);
  ctx.fillStyle="rgba(55,138,221,0.06)";ctx.fill();
  drawBit(bt,bity);drawRatchet(r,ry);drawBlade(b,by);
}
function loop(){
  if(spinning) angle+=0.018;
  if(viewMode==="explode"){
    explodeT+=.012*explodeDir;
    if(explodeT>=1){explodeT=1;explodeDir=-1;}
    if(explodeT<=0){explodeT=0;explodeDir=1;}
  }
  drawFrame();
  requestAnimationFrame(loop);
}
function setView(v,el){
  viewMode=v;explodeT=0;explodeDir=1;
  document.querySelectorAll(".vtab").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}
function toggleSpin(){
  spinning=!spinning;
  document.getElementById("spin-icon").className=spinning?"ti ti-player-pause":"ti ti-player-play";
  document.getElementById("spin-label").textContent=spinning?"自轉中":"已暫停";
}

//狀態更新與統計計算配置分數與顯示文字的邏輯
function updateStats(){
  const b=BLADES[selB],r=RATCHETS[selR],bt=BITS[selBit];
  const atk=Math.min(100,b.atk+r.atk+bt.atk);
  const def=Math.min(100,b.def+r.def+bt.def);
  const dur=Math.min(100,b.dur+r.dur+bt.dur);
  const w=(b.weight+r.weight+bt.weight).toFixed(1);
  const score=Math.round((atk*.35+def*.35+dur*.3)*.9+5);
  ["atk","def","dur"].forEach(s=>{
    const v={atk,def,dur}[s];
    document.getElementById("v-"+s).textContent=v;
    document.getElementById("b-"+s).style.width=v+"%";
    document.getElementById("bn-"+s).textContent=v;
  });
  document.getElementById("combo-name").textContent=b.name+" / "+r.name+" / "+bt.name;
  const max=Math.max(atk,def,dur);
  let type,tc;
  if(max===atk&&atk-def>15){type="攻擊型";tc="#D85A30";}
  else if(max===def&&def-atk>15){type="防禦型";tc="#378ADD";}
  else if(max===dur&&dur-atk>15){type="持久型";tc="#1D9E75";}
  else{type="平衡型";tc="#BA7517";}
  const sb=document.getElementById("score-badge");
  sb.textContent=score+" 分・"+type;sb.style.color=tc;sb.style.borderColor=tc+"44";
  const totalP=b.price+r.price+bt.price;
  document.getElementById("meta-row").innerHTML=
    `<span class="mpill">⚖ ${w}g</span><span class="mpill">NT$ ${totalP.toLocaleString()}</span>`;
}
function rebuild(){
  buildDropdown("cs-blade",BLADES,"blade",selB,(i)=>{selB=i;rebuild();});
  buildDropdown("cs-ratchet",RATCHETS,"ratchet",selR,(i)=>{selR=i;rebuild();});
  buildDropdown("cs-bit",BITS,"bit",selBit,(i)=>{selBit=i;rebuild();});
  updateStats();
}

//互動事件處理滑鼠拖曳旋轉與滾輪縮放。
const ca=document.getElementById("ca");
ca.addEventListener("mousedown",e=>{dragStart={x:e.clientX,y:e.clientY};dragAngle=angle;dragTilt=tiltX;});
ca.addEventListener("mousemove",e=>{if(!dragStart) return;angle=dragAngle+(e.clientX-dragStart.x)*.012;tiltX=Math.max(-.9,Math.min(.9,dragTilt-(e.clientY-dragStart.y)*.009));});
ca.addEventListener("mouseup",()=>dragStart=null);ca.addEventListener("mouseleave",()=>dragStart=null);
ca.addEventListener("wheel",e=>{e.preventDefault();zoom=Math.max(.5,Math.min(2,zoom-e.deltaY*.001));},{passive:false});
ca.addEventListener("touchstart",e=>{if(e.touches.length===1){dragStart={x:e.touches[0].clientX,y:e.touches[0].clientY};dragAngle=angle;dragTilt=tiltX;}});
ca.addEventListener("touchmove",e=>{e.preventDefault();if(!dragStart||e.touches.length!==1) return;angle=dragAngle+(e.touches[0].clientX-dragStart.x)*.012;tiltX=Math.max(-.9,Math.min(.9,dragTilt-(e.touches[0].clientY-dragStart.y)*.009));},{passive:false});
ca.addEventListener("touchend",()=>dragStart=null);

rebuild();
startThumbAnim();
loop();
</script>

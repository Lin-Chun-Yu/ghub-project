
<h2 class="sr-only">G-Hub 神配置計算機：BX-02 惡魔紅鐮俯視造型 3D 旋轉預覽</h2>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#18181f;--bg4:#1e1e28;
  --bd:#2a2a38;--bd2:#363648;
  --t1:#f0f0f8;--t2:#9090a8;--t3:#5a5a70;
  --blue:#378ADD;--blue2:#85B7EB;--blue3:#0C447C;
}
body{background:var(--bg);font-family:var(--font-sans);color:var(--t1)}
.shell{display:flex;flex-direction:column;height:720px}
.navbar{display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:52px;background:var(--bg2);border-bottom:0.5px solid var(--bd2);flex-shrink:0}
.brand{display:flex;align-items:center;gap:10px}
.brand-name{font-size:15px;font-weight:500;color:var(--t1);letter-spacing:.04em}
.brand-sub{font-size:9px;color:var(--t3);letter-spacing:.06em;text-transform:uppercase}
.nav-badge{font-size:10px;padding:3px 10px;border-radius:20px;background:rgba(55,138,221,0.12);color:var(--blue2);border:0.5px solid rgba(55,138,221,0.2)}
.layout{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:0;flex:1;overflow:hidden}
.col-3d{background:var(--bg3);border-right:0.5px solid var(--bd);display:flex;flex-direction:column;padding:12px;gap:8px;overflow:hidden}
.canvas-area{background:radial-gradient(ellipse at 50% 40%,#1a0d0d 0%,#0d0d14 60%,#080810 100%);border-radius:12px;border:0.5px solid var(--bd2);flex:1;cursor:grab;overflow:hidden;min-height:0;position:relative}
.canvas-area:active{cursor:grabbing}
canvas{display:block;width:100%;height:100%}
.drag-hint{font-size:10px;color:var(--t3);text-align:center;flex-shrink:0}
.view-row{display:flex;gap:6px;justify-content:space-between;align-items:center;flex-shrink:0}
.vtabs{display:flex;gap:4px}
.vtab{font-size:11px;padding:4px 11px;border-radius:20px;border:0.5px solid var(--bd2);background:transparent;color:var(--t2);cursor:pointer;transition:all .15s}
.vtab.active{background:var(--blue3);color:var(--blue2);border-color:var(--blue3)}
.spin-btn{font-size:11px;padding:4px 10px;border-radius:20px;border:0.5px solid var(--bd2);background:transparent;color:var(--t2);cursor:pointer;display:flex;align-items:center;gap:4px}
.col-right{display:flex;flex-direction:column;overflow-y:auto;padding:12px;gap:10px}
.col-right::-webkit-scrollbar{width:3px}
.col-right::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.sec-lbl{font-size:10px;font-weight:500;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.part-block{background:var(--bg3);border-radius:12px;border:0.5px solid var(--bd);padding:12px;margin-bottom:8px}
.part-head{font-size:12px;color:var(--t2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.part-head i{font-size:14px;color:var(--blue)}
.sel-wrap{position:relative}
.sel-trigger{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg4);border:0.5px solid var(--bd2);border-radius:8px;cursor:pointer;transition:border-color .15s;user-select:none}
.sel-trigger:hover{border-color:var(--blue3)}
.sel-icon{width:32px;height:32px;border-radius:6px;flex-shrink:0;overflow:hidden}
.sel-text{flex:1;min-width:0}
.sel-name{font-size:12px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sel-sub{font-size:10px;color:var(--t3)}
.sel-arr{color:var(--t3);font-size:13px;transition:transform .2s;flex-shrink:0}
.sel-arr.open{transform:rotate(180deg)}
.dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:200;background:var(--bg3);border:0.5px solid var(--bd2);border-radius:10px;overflow:hidden;display:none;box-shadow:0 8px 28px rgba(0,0,0,.7)}
.dropdown.open{display:block}
.dopt{display:flex;align-items:center;gap:10px;padding:8px 10px;cursor:pointer;border-bottom:0.5px solid var(--bd);transition:background .1s}
.dopt:last-child{border-bottom:none}
.dopt:hover,.dopt.active{background:rgba(55,138,221,0.08)}
.dopt-icon{width:36px;height:36px;border-radius:7px;flex-shrink:0;overflow:hidden}
.dopt-text{flex:1;min-width:0}
.dopt-name{font-size:12px;font-weight:500;color:var(--t1)}
.dopt-sub{font-size:10px;color:var(--t3)}
.hot-badge{font-size:10px;padding:2px 6px;border-radius:20px;background:rgba(163,45,45,0.2);color:#F09595;border:0.5px solid rgba(163,45,45,0.3);flex-shrink:0}
.wt-lbl{font-size:10px;color:var(--t3);flex-shrink:0}
.stats-card{background:var(--bg3);border-radius:12px;border:0.5px solid var(--bd);padding:12px}
.stats-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;margin-bottom:10px}
.stat-box{background:var(--bg4);border-radius:8px;border:0.5px solid var(--bd);padding:.55rem;text-align:center}
.stat-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.stat-num{font-size:17px;font-weight:500}
.bar-block{margin-bottom:6px}
.bar-row{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--t3)}
.bar-lbl{min-width:30px;font-size:10px}
.bar-bg{flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.bar-fill{height:4px;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.bar-num{min-width:22px;text-align:right;font-size:10px;color:var(--t2)}
.divider{height:0.5px;background:var(--bd);margin:8px 0}
.bottom-row{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.combo-name{font-size:11px;font-weight:500;color:var(--t1);line-height:1.4}
.meta-row{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap}
.mpill{font-size:9px;padding:2px 7px;border-radius:20px;background:var(--bg4);color:var(--t2);border:0.5px solid var(--bd)}
.score-badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;background:var(--bg4);border:0.5px solid var(--bd2);flex-shrink:0}
@media(max-width:520px){.layout{grid-template-columns:1fr;grid-template-rows:auto 1fr}.col-3d{border-right:none;border-bottom:0.5px solid var(--bd);max-height:300px}.canvas-area{min-height:200px}}
</style>

  {id:"unitBit",name:"Unit",sub:"持久・穩定",color:"#1D9E75",accent:"#9FE1CB",shape:"unit",weight:5.1,atk:0,def:10,dur:20,hgt:10,spd:3,end:18,hot:false},
];

let selB=0,selR=0,selBit=0;
let angle=0,tiltX=0.55,zoom=1,spinning=true;
let viewMode="full",explodeT=0,explodeDir=1;
let dragStart=null,dragAngle=0,dragTilt=0;
let cvs=null,ctx=null,CW=0,CH=0,CX=0,CY=0;
let thumbAnims=[],thumbA=0;

function initCanvas(){
  if(cvs)return;
  cvs=document.getElementById("c3d");
  const ca=document.getElementById("ca");
  const resize=()=>{CW=ca.offsetWidth||310;CH=ca.offsetHeight||300;cvs.width=CW;cvs.height=CH;CX=CW/2;CY=CH/2-5;};
  resize();
  ctx=cvs.getContext("2d");
  ca.addEventListener("mousedown",e=>{dragStart={x:e.clientX,y:e.clientY};dragAngle=angle;dragTilt=tiltX;});
  ca.addEventListener("mousemove",e=>{if(!dragStart)return;angle=dragAngle+(e.clientX-dragStart.x)*.013;tiltX=Math.max(0.05,Math.min(1.3,dragTilt-(e.clientY-dragStart.y)*.009));});
  ca.addEventListener("mouseup",()=>dragStart=null);
  ca.addEventListener("mouseleave",()=>dragStart=null);
  ca.addEventListener("wheel",e=>{e.preventDefault();zoom=Math.max(.4,Math.min(2.2,zoom-e.deltaY*.001));},{passive:false});
  ca.addEventListener("touchstart",e=>{if(e.touches.length===1){dragStart={x:e.touches[0].clientX,y:e.touches[0].clientY};dragAngle=angle;dragTilt=tiltX;}});
  ca.addEventListener("touchmove",e=>{e.preventDefault();if(!dragStart||e.touches.length!==1)return;angle=dragAngle+(e.touches[0].clientX-dragStart.x)*.013;tiltX=Math.max(0.05,Math.min(1.3,dragTilt-(e.touches[0].clientY-dragStart.y)*.009));},{passive:false});
  ca.addEventListener("touchend",()=>dragStart=null);
  mainLoop();
}

function proj(x,y,z){
  const cA=Math.cos(angle),sA=Math.sin(angle),cT=Math.cos(tiltX),sT=Math.sin(tiltX);
  const rx=x*cA-z*sA,rz=x*sA+z*cA;
  const ry2=y*cT-rz*sT,rz2=y*sT+rz*cT;
  const d=520,sc=zoom*d/(d+rz2);
  return{px:CX+rx*sc,py:CY+ry2*sc,depth:rz2,sc};
}

/* ══════════════════════════════════════════
   BX-02 惡魔紅鐮：真實俯視造型重建
   - 鋸齒狀外框（12個尖角）
   - 4片向內彎鐮刀刃（深色金屬）
   - 大片鮮紅色盤面（帶骷髏圖騰文字）
   - 銀白色中央芯
══════════════════════════════════════════ */
function drawBX02(b,oy){
  const c=ctx;
  const cT=Math.abs(Math.cos(tiltX));

  /* 1. 外框陰影 */
  const shadowR=zoom*72;
  const shp=proj(0,oy+zoom*6,0);
  c.beginPath();c.ellipse(shp.px,shp.py,shadowR,shadowR*cT*0.35,0,0,Math.PI*2);
  c.fillStyle="rgba(0,0,0,0.45)";c.fill();

  /* 2. 鋸齒外框（12個尖角交替大小） */
  // 外框由 8個大尖角 + 8個小凹口組成
  const outerR=zoom*68, innerR=zoom*52, midR=zoom*60;
  const numSpikes=8;

  // 底面（深色）
  c.beginPath();
  for(let i=0;i<numSpikes*2;i++){
    const a=angle+(i/(numSpikes*2))*Math.PI*2 - Math.PI/numSpikes/2;
    const r=(i%2===0)?outerR:innerR;
    const p=proj(Math.cos(a)*r, oy+zoom*4, Math.sin(a)*r);
    if(i===0)c.moveTo(p.px,p.py);else c.lineTo(p.px,p.py);
  }
  c.closePath();
  c.fillStyle="#111";c.fill();

  // 上面（金屬深灰漸層）
  c.beginPath();
  for(let i=0;i<numSpikes*2;i++){
    const a=angle+(i/(numSpikes*2))*Math.PI*2 - Math.PI/numSpikes/2;
    const r=(i%2===0)?outerR:innerR;
    const p=proj(Math.cos(a)*r, oy-zoom*3, Math.sin(a)*r);
    if(i===0)c.moveTo(p.px,p.py);else c.lineTo(p.px,p.py);
  }
  c.closePath();
  const rimGrad=c.createRadialGradient(CX,CY,innerR*.4,CX,CY,outerR);
  rimGrad.addColorStop(0,"#3a3a3a");rimGrad.addColorStop(.5,"#252525");rimGrad.addColorStop(1,"#141414");
  c.fillStyle=rimGrad;c.fill();
  c.strokeStyle="#555555";c.lineWidth=.8;c.stroke();

  /* 3. 各尖角面高光 */
  for(let i=0;i<numSpikes;i++){
    const aCenter=angle+(i/numSpikes)*Math.PI*2;
    const aLeft=aCenter - Math.PI/numSpikes*.7;
    const aRight=aCenter + Math.PI/numSpikes*.7;
    const p0=proj(Math.cos(aCenter)*outerR*0.97,oy-zoom*4,Math.sin(aCenter)*outerR*0.97);
    const p1=proj(Math.cos(aLeft)*innerR*1.02,oy-zoom*2,Math.sin(aLeft)*innerR*1.02);
    const p2=proj(Math.cos(aRight)*innerR*1.02,oy-zoom*2,Math.sin(aRight)*innerR*1.02);
    c.beginPath();c.moveTo(p0.px,p0.py);c.lineTo(p1.px,p1.py);c.lineTo(p2.px,p2.py);c.closePath();
    // 根據角度決定亮暗（模擬光源從左上）
    const lightFactor=Math.cos(aCenter-angle)*0.5+0.5;
    const bright=Math.floor(50+lightFactor*60);
    c.fillStyle=`rgb(${bright},${bright},${bright})`;c.fill();
    c.strokeStyle="#44444466";c.lineWidth=.5;c.stroke();
  }

  /* 4. 紅色大盤面 */
  const redR=zoom*50;
  // 底部紅圓（立體感）
  const redBotP=proj(0,oy+zoom*2,0);
  c.beginPath();c.ellipse(redBotP.px,redBotP.py,redR,redR*cT,0,0,Math.PI*2);
  c.fillStyle="#440000";c.fill();

  // 頂部紅圓
  const redTopP=proj(0,oy-zoom*3,0);
  c.beginPath();c.ellipse(redTopP.px,redTopP.py,redR,redR*cT,0,0,Math.PI*2);
  const redGrad=c.createRadialGradient(redTopP.px-zoom*8,redTopP.py-zoom*5,zoom*2,redTopP.px,redTopP.py,redR);
  redGrad.addColorStop(0,"#FF3333");redGrad.addColorStop(.35,"#CC1111");redGrad.addColorStop(.7,"#991111");redGrad.addColorStop(1,"#550000");
  c.fillStyle=redGrad;c.fill();

  /* 5. 紅色盤面上的深色條紋裝飾（模擬骷髏紋） */
  // 同心圓紋路
  for(let r=zoom*12;r<redR*.85;r+=zoom*8){
    const rp=proj(0,oy-zoom*3.5,0);
    c.beginPath();c.ellipse(rp.px,rp.py,r,r*cT,0,0,Math.PI*2);
    c.strokeStyle="rgba(0,0,0,0.15)";c.lineWidth=.8;c.stroke();
  }

  // 放射狀紋路（火焰感）
  for(let i=0;i<8;i++){
    const ra=angle+(i/8)*Math.PI*2;
    const inner2=proj(Math.cos(ra)*zoom*6,oy-zoom*4,Math.sin(ra)*zoom*6);
    const outer2=proj(Math.cos(ra)*redR*.82,oy-zoom*4,Math.sin(ra)*redR*.82);
    c.beginPath();c.moveTo(inner2.px,inner2.py);c.lineTo(outer2.px,outer2.py);
    c.strokeStyle="rgba(0,0,0,0.12)";c.lineWidth=1.2;c.stroke();
  }

  /* 6. 4片鐮刀刃（深色金屬，橫跨紅色盤面） */
  const n=4;
  for(let i=0;i<n;i++){
    const baseA=angle+(i/n)*Math.PI*2;
    // 每片刃：從 innerR 附近向外彎曲，形成鐮刀
    const bladeW=zoom*11;
    const pts=[];const S=18;
    for(let s=0;s<=S;s++){
      const t=s/S;
      const curA=baseA + t*0.78; // 彎曲弧度
      const curR=zoom*22 + (zoom*46-zoom*22)*(t*t*0.9+t*0.1);
      const nx=-Math.sin(curA),nz=Math.cos(curA);
      const fat=bladeW*(0.6+0.8*Math.sin(t*Math.PI));
      pts.push(proj(Math.cos(curA)*curR+nx*fat*.45,oy-zoom*5.5,Math.sin(curA)*curR+nz*fat*.45));
    }
    for(let s=S;s>=0;s--){
      const t=s/S;
      const curA=baseA + t*0.78;
      const curR=zoom*22 + (zoom*46-zoom*22)*(t*t*0.9+t*0.1);
      const nx=-Math.sin(curA),nz=Math.cos(curA);
      const fat=bladeW*(0.6+0.8*Math.sin(t*Math.PI));
      pts.push(proj(Math.cos(curA)*curR-nx*fat*.45,oy-zoom*3.5,Math.sin(curA)*curR-nz*fat*.45));
    }
    c.beginPath();c.moveTo(pts[0].px,pts[0].py);
    pts.forEach(p=>c.lineTo(p.px,p.py));c.closePath();

    // 金屬漸層（帶光澤感）
    const lightA=baseA+0.3;
    const lightFactor=Math.cos(lightA-0.5)*0.5+0.5;
    const mg=c.createLinearGradient(
      CX+Math.cos(baseA)*zoom*20,CY+Math.sin(baseA)*zoom*20,
      CX+Math.cos(baseA+Math.PI)*zoom*20,CY+Math.sin(baseA+Math.PI)*zoom*20
    );
    mg.addColorStop(0,`rgba(200,200,200,${0.4+lightFactor*.4})`);
    mg.addColorStop(.3,`rgba(100,100,100,0.9)`);
    mg.addColorStop(.7,`rgba(50,50,50,0.95)`);
    mg.addColorStop(1,`rgba(20,20,20,1)`);
    c.fillStyle=mg;c.fill();

    // 刃邊高光線
    c.beginPath();
    for(let s=0;s<=S;s++){
      const t=s/S;
      const curA=baseA+t*0.78;
      const curR=zoom*22+(zoom*46-zoom*22)*(t*t*.9+t*.1);
      const nx=-Math.sin(curA),nz=Math.cos(curA);
      const fat=bladeW*(0.6+0.8*Math.sin(t*Math.PI));
      const p=proj(Math.cos(curA)*curR+nx*(fat*.45+zoom*.8),oy-zoom*5.8,Math.sin(curA)*curR+nz*(fat*.45+zoom*.8));
      if(s===0)c.moveTo(p.px,p.py);else c.lineTo(p.px,p.py);
    }
    c.strokeStyle=`rgba(255,255,255,${0.3+lightFactor*.35})`;c.lineWidth=.9;c.stroke();
  }

  /* 7. 中央芯（銀白色） */
  const coreR=zoom*14;
  const coreBotP=proj(0,oy+zoom*1,0);
  c.beginPath();c.ellipse(coreBotP.px,coreBotP.py,coreR,coreR*cT,0,0,Math.PI*2);
  c.fillStyle="#333";c.fill();

  const coreTopP=proj(0,oy-zoom*4.5,0);
  c.beginPath();c.ellipse(coreTopP.px,coreTopP.py,coreR,coreR*cT,0,0,Math.PI*2);
  const coreG=c.createRadialGradient(coreTopP.px-zoom*3,coreTopP.py-zoom*2,zoom,coreTopP.px,coreTopP.py,coreR);
  coreG.addColorStop(0,"#ffffff");coreG.addColorStop(.3,"#dddddd");coreG.addColorStop(.7,"#999999");coreG.addColorStop(1,"#444444");
  c.fillStyle=coreG;c.fill();
  c.strokeStyle="#88888866";c.lineWidth=.8;c.stroke();

  // 芯中心小點
  const dotP=proj(0,oy-zoom*5,0);
  c.beginPath();c.arc(dotP.px,dotP.py,zoom*2.5,0,Math.PI*2);
  c.fillStyle="#222";c.fill();
  c.beginPath();c.arc(dotP.px-zoom*.6,dotP.py-zoom*.6,zoom*.8,0,Math.PI*2);
  c.fillStyle="rgba(255,255,255,0.6)";c.fill();
}

/* ── 通用戰刃 ── */
function drawGenericBlade(b,oy){
  const c=ctx,OR=zoom*58*b.sharp,IR=zoom*22,HH=zoom*11,n=b.bc;
  for(let i=0;i<n;i++){
    const a0=angle+(i/n)*Math.PI*2,a1=a0+b.sw*Math.PI*2/n,pts=[],S=14;
    for(let s=0;s<=S;s++){const a=a0+s*(a1-a0)/S,r=IR+(OR-IR)*(s/S),p=proj(Math.cos(a)*r,oy-HH*.4,Math.sin(a)*r);pts.push(p);}
    for(let s=S;s>=0;s--){const a=a0+s*(a1-a0)/S,r=(IR+(OR-IR)*(s/S))*.55,p=proj(Math.cos(a)*r,oy+HH*.4,Math.sin(a)*r);pts.push(p);}
    c.beginPath();c.moveTo(pts[0].px,pts[0].py);pts.forEach(p=>c.lineTo(p.px,p.py));c.closePath();
    const g=c.createLinearGradient(CX-OR,CY-OR,CX+OR,CY+OR);g.addColorStop(0,b.accent);g.addColorStop(1,b.color);
    c.fillStyle=g;c.fill();c.strokeStyle=b.color+"99";c.lineWidth=.6;c.stroke();
  }
  const tc=proj(0,oy,0);
  c.beginPath();c.ellipse(tc.px,tc.py,zoom*15,zoom*15*Math.abs(Math.cos(tiltX)),0,0,Math.PI*2);
  const cg=c.createRadialGradient(tc.px,tc.py,2,tc.px,tc.py,zoom*15);cg.addColorStop(0,"#fff");cg.addColorStop(1,b.accent);
  c.fillStyle=cg;c.fill();c.strokeStyle=b.color;c.lineWidth=.7;c.stroke();
}

function drawBlade(b,oy){b.type==="bx02"?drawBX02(b,oy):drawGenericBlade(b,oy);}

function drawRatchet(r,oy){
  const c=ctx,n=r.teeth,OR=zoom*40,IR=zoom*26,H2=zoom*8;
  c.beginPath();for(let i=0;i<n*2;i++){const a=angle+(i/(n*2))*Math.PI*2,rr=(i%2===0)?OR:IR,p=proj(Math.cos(a)*rr,oy+H2*.4,Math.sin(a)*rr);if(i===0)c.moveTo(p.px,p.py);else c.lineTo(p.px,p.py);}
  c.closePath();c.fillStyle=r.accent+"44";c.fill();c.strokeStyle=r.color;c.lineWidth=.5;c.stroke();
  c.beginPath();for(let i=0;i<n*2;i++){const a=angle+(i/(n*2))*Math.PI*2,rr=(i%2===0)?OR:IR,p=proj(Math.cos(a)*rr,oy-H2*.5,Math.sin(a)*rr);if(i===0)c.moveTo(p.px,p.py);else c.lineTo(p.px,p.py);}
  c.closePath();const g=c.createRadialGradient(CX,CY,OR*.2,CX,CY,OR);g.addColorStop(0,r.accent);g.addColorStop(1,r.color);
  c.fillStyle=g;c.fill();c.strokeStyle=r.color+"88";c.lineWidth=.5;c.stroke();
  const cc=proj(0,oy,0);c.beginPath();c.ellipse(cc.px,cc.py,zoom*11,zoom*11*Math.abs(Math.cos(tiltX)),0,0,Math.PI*2);c.fillStyle=r.color;c.fill();
}

function drawBit(bt,oy){
  const c=ctx,topR=zoom*19,H2=zoom*50,sh=bt.shape,S=18,lp=[],rp=[];
  for(let i=0;i<=S;i++){
    const t=i/S;let r;
    if(sh==="point")r=topR*(1-t*.88);else if(sh==="flat")r=topR*(1-t*.15);else if(sh==="ball")r=topR*Math.sin(t*Math.PI*.85+.1);else if(sh==="rush")r=topR*(1-t*.82);else r=topR*(.45+.55*Math.cos(t*Math.PI));
    const y=oy-H2*.5+t*H2;lp.push(proj(Math.cos(angle)*r,y,Math.sin(angle)*r));rp.push(proj(Math.cos(angle+Math.PI)*r,y,Math.sin(angle+Math.PI)*r));
  }
  c.beginPath();c.moveTo(lp[0].px,lp[0].py);lp.forEach(p=>c.lineTo(p.px,p.py));for(let i=rp.length-1;i>=0;i--)c.lineTo(rp[i].px,rp[i].py);c.closePath();
  const g=c.createLinearGradient(CX-topR,CY-H2*.4,CX+topR,CY+H2*.4);g.addColorStop(0,bt.accent);g.addColorStop(1,bt.color);
  c.fillStyle=g;c.fill();c.strokeStyle=bt.color;c.lineWidth=.7;c.stroke();
  const tip=proj(0,oy+H2*.5,0);c.beginPath();c.arc(tip.px,tip.py,zoom*3.5,0,Math.PI*2);c.fillStyle="#fff";c.fill();
}

function drawFrame(){
  if(!ctx)return;
  ctx.clearRect(0,0,CW,CH);
  const b=BLADES[selB],r=RATCHETS[selR],bt=BITS[selBit];
  let by,ry,bity;
  if(viewMode==="explode"){by=-zoom*(26+explodeT*40);ry=zoom*2;bity=zoom*(22+explodeT*40);}
  else{by=-zoom*26;ry=zoom*2;bity=zoom*22;}
  drawBit(bt,bity);drawRatchet(r,ry);drawBlade(b,by);
}

function mainLoop(){
  if(spinning)angle+=0.016;
  if(viewMode==="explode"){explodeT+=.012*explodeDir;if(explodeT>=1){explodeT=1;explodeDir=-1;}if(explodeT<=0){explodeT=0;explodeDir=1;}}
  drawFrame();requestAnimationFrame(mainLoop);
}

function setView(v,el){viewMode=v;explodeT=0;explodeDir=1;document.querySelectorAll(".vtab").forEach(b=>b.classList.remove("active"));el.classList.add("active");}
function toggleSpin(){spinning=!spinning;document.getElementById("spin-icon").className=spinning?"ti ti-player-pause":"ti ti-player-play";document.getElementById("spin-lbl").textContent=spinning?"自轉中":"已暫停";}

/* ── 縮圖 ── */
function drawThumb(c2,part,type,size,a){
  const cx=size/2,cy=size/2;
  c2.clearRect(0,0,size,size);c2.fillStyle="#18181f";c2.beginPath();c2.roundRect(0,0,size,size,5);c2.fill();
  if(type==="blade"&&part.type==="bx02"){
    // BX-02 縮圖：鋸齒外框 + 紅盤 + 4片鐮刀
    const outerR=size*.45,innerR=size*.34,redR=size*.33;
    const spikes=8;
    c2.beginPath();
    for(let i=0;i<spikes*2;i++){const ang=a+(i/(spikes*2))*Math.PI*2;const r=(i%2===0)?outerR:innerR;if(i===0)c2.moveTo(cx+Math.cos(ang)*r,cy+Math.sin(ang)*r);else c2.lineTo(cx+Math.cos(ang)*r,cy+Math.sin(ang)*r);}
    c2.closePath();c2.fillStyle="#222";c2.fill();c2.strokeStyle="#555";c2.lineWidth=.7;c2.stroke();
    c2.beginPath();c2.arc(cx,cy,redR,0,Math.PI*2);
    const rg=c2.createRadialGradient(cx-size*.06,cy-size*.06,size*.02,cx,cy,redR);
    rg.addColorStop(0,"#FF3333");rg.addColorStop(.6,"#CC1111");rg.addColorStop(1,"#550000");
    c2.fillStyle=rg;c2.fill();
    for(let i=0;i<4;i++){
      const ba=a+(i/4)*Math.PI*2;const pts2=[];const S=10;
      for(let s=0;s<=S;s++){const t=s/S;const ca2=ba+t*.78;const cr=size*.14+(size*.3-size*.14)*(t*t*.9+t*.1);const fat=size*.065*(0.6+0.8*Math.sin(t*Math.PI));const nx=-Math.sin(ca2),nz=Math.cos(ca2);pts2.push({x:cx+Math.cos(ca2)*cr+nx*fat*.45,y:cy+Math.sin(ca2)*cr+nz*fat*.45});}
      for(let s=S;s>=0;s--){const t=s/S;const ca2=ba+t*.78;const cr=size*.14+(size*.3-size*.14)*(t*t*.9+t*.1);const fat=size*.065*(0.6+0.8*Math.sin(t*Math.PI));const nx=-Math.sin(ca2),nz=Math.cos(ca2);pts2.push({x:cx+Math.cos(ca2)*cr-nx*fat*.45,y:cy+Math.sin(ca2)*cr-nz*fat*.45});}
      c2.beginPath();c2.moveTo(pts2[0].x,pts2[0].y);pts2.forEach(p=>c2.lineTo(p.x,p.y));c2.closePath();
      c2.fillStyle="rgba(60,60,60,0.92)";c2.fill();
    }
    c2.beginPath();c2.arc(cx,cy,size*.09,0,Math.PI*2);const cg2=c2.createRadialGradient(cx-size*.03,cy-size*.02,size*.005,cx,cy,size*.09);cg2.addColorStop(0,"#fff");cg2.addColorStop(1,"#666");c2.fillStyle=cg2;c2.fill();
  } else if(type==="blade"){
    const OR=size*.42*part.sharp,IR=size*.15,n=part.bc;
    for(let i=0;i<n;i++){
      const a0=a+(i/n)*Math.PI*2,a1=a0+part.sw*Math.PI*2/n,pts=[],S=10;
      for(let s=0;s<=S;s++){const ang=a0+s*(a1-a0)/S,r=IR+(OR-IR)*(s/S);pts.push({x:cx+Math.cos(ang)*r,y:cy+Math.sin(ang)*r});}
      for(let s=S;s>=0;s--){const ang=a0+s*(a1-a0)/S,r=(IR+(OR-IR)*(s/S))*.5;pts.push({x:cx+Math.cos(ang)*r,y:cy+Math.sin(ang)*r});}
      c2.beginPath();c2.moveTo(pts[0].x,pts[0].y);pts.forEach(p=>c2.lineTo(p.x,p.y));c2.closePath();
      const g=c2.createLinearGradient(cx-OR,cy-OR,cx+OR,cy+OR);g.addColorStop(0,part.accent);g.addColorStop(1,part.color);c2.fillStyle=g;c2.fill();
    }
    c2.beginPath();c2.arc(cx,cy,size*.1,0,Math.PI*2);c2.fillStyle="#fff";c2.fill();
  } else if(type==="ratchet"){
    const n=part.teeth,OR=size*.42,IR=size*.27;
    c2.beginPath();for(let i=0;i<n*2;i++){const ang=a+(i/(n*2))*Math.PI*2,r=(i%2===0)?OR:IR;if(i===0)c2.moveTo(cx+Math.cos(ang)*r,cy+Math.sin(ang)*r);else c2.lineTo(cx+Math.cos(ang)*r,cy+Math.sin(ang)*r);}
    c2.closePath();const g=c2.createRadialGradient(cx,cy,IR*.3,cx,cy,OR);g.addColorStop(0,part.accent);g.addColorStop(1,part.color);c2.fillStyle=g;c2.fill();
    c2.beginPath();c2.arc(cx,cy,size*.12,0,Math.PI*2);c2.fillStyle=part.color;c2.fill();
  } else {
    const sh=part.shape,topR=size*.22,pts=[],S=12;
    for(let i=0;i<=S;i++){const t=i/S;let r;if(sh==="point")r=topR*(1-t*.88);else if(sh==="flat")r=topR*(1-t*.15);else if(sh==="ball")r=topR*Math.sin(t*Math.PI*.85+.1);else if(sh==="rush")r=topR*(1-t*.82);else r=topR*(.45+.55*Math.cos(t*Math.PI));pts.push({x:cx+r,y:cy-size*.35+t*size*.7,r});}
    c2.beginPath();c2.moveTo(pts[0].x,pts[0].y);pts.forEach(p=>c2.lineTo(p.x,p.y));for(let i=pts.length-1;i>=0;i--)c2.lineTo(cx-pts[i].r,pts[i].y);c2.closePath();
    const g=c2.createLinearGradient(cx-topR,0,cx+topR,size);g.addColorStop(0,part.accent);g.addColorStop(1,part.color);c2.fillStyle=g;c2.fill();
    c2.beginPath();c2.arc(cx,cy+size*.3,size*.05,0,Math.PI*2);c2.fillStyle="#fff";c2.fill();
  }
}

function startThumbAnim(){
  cancelAnimationFrame(startThumbAnim._id);
  function tick(){thumbA+=0.025;thumbAnims.forEach(o=>drawThumb(o.c2,o.p,o.t,o.s,thumbA));startThumbAnim._id=requestAnimationFrame(tick);}
  tick();
}
function makeThumb(part,type,size){
  const c=document.createElement("canvas");c.width=c.height=size;thumbAnims.push({c2:c.getContext("2d"),p:part,t:type,s:size});return c;
}

function buildDD(cid,parts,type,sel,onSel){
  const wrap=document.getElementById(cid);
  const trig=document.createElement("div");trig.className="sel-trigger";
  const ic=makeThumb(parts[sel],type,32);const iw=document.createElement("div");iw.className="sel-icon";iw.appendChild(ic);
  const tx=document.createElement("div");tx.className="sel-text";tx.innerHTML=`<div class="sel-name">${parts[sel].name}</div><div class="sel-sub">${parts[sel].sub}</div>`;
  const arr=document.createElement("i");arr.className="ti ti-chevron-down sel-arr";arr.setAttribute("aria-hidden","true");
  trig.appendChild(iw);trig.appendChild(tx);trig.appendChild(arr);
  const dd=document.createElement("div");dd.className="dropdown";
  parts.forEach((p,i)=>{
    const opt=document.createElement("div");opt.className="dopt"+(i===sel?" active":"");
    const dic=makeThumb(p,type,36);const diw=document.createElement("div");diw.className="dopt-icon";diw.appendChild(dic);
    const dt=document.createElement("div");dt.className="dopt-text";dt.innerHTML=`<div class="dopt-name">${p.name}</div><div class="dopt-sub">${p.sub}</div>`;
    opt.appendChild(diw);opt.appendChild(dt);
    if(p.hot){const hb=document.createElement("span");hb.className="hot-badge";hb.textContent="熱門";opt.appendChild(hb);}
    const wb=document.createElement("span");wb.className="wt-lbl";wb.textContent=p.weight+"g";opt.appendChild(wb);
    opt.addEventListener("click",()=>{dd.classList.remove("open");arr.classList.remove("open");onSel(i);});
    dd.appendChild(opt);
  });
  trig.addEventListener("click",e=>{e.stopPropagation();const op=dd.classList.contains("open");document.querySelectorAll(".dropdown.open").forEach(d=>d.classList.remove("open"));document.querySelectorAll(".sel-arr.open").forEach(a=>a.classList.remove("open"));if(!op){dd.classList.add("open");arr.classList.add("open");}});
  wrap.innerHTML="";wrap.appendChild(trig);wrap.appendChild(dd);
}
document.addEventListener("click",()=>{document.querySelectorAll(".dropdown.open").forEach(d=>d.classList.remove("open"));document.querySelectorAll(".sel-arr.open").forEach(a=>a.classList.remove("open"));});

function updateStats(){
  const b=BLADES[selB],r=RATCHETS[selR],bt=BITS[selBit];
  const atk=Math.min(100,b.atk+r.atk+bt.atk),def=Math.min(100,b.def+r.def+bt.def),dur=Math.min(100,b.dur+r.dur+bt.dur);
  const hgt=Math.min(100,b.hgt+r.hgt+bt.hgt),spd=Math.min(100,b.spd+r.spd+bt.spd),end=Math.min(100,b.end+r.end+bt.end);
  const w=(b.weight+r.weight+bt.weight).toFixed(1);
  const score=Math.round((atk*.2+def*.2+dur*.2+hgt*.1+spd*.15+end*.15)*.9+5);
  const vals={atk,def,dur,hgt,spd,end};
  Object.keys(vals).forEach(k=>{document.getElementById("v-"+k).textContent=vals[k];document.getElementById("b-"+k).style.width=vals[k]+"%";document.getElementById("bn-"+k).textContent=vals[k];});
  document.getElementById("combo-name").textContent=b.name+" / "+r.name+" / "+bt.name;
  const max=Math.max(atk,def,dur);let type="平衡型",tc="#BA7517";
  if(max===atk&&atk-def>15){type="攻擊型";tc="#D85A30";}else if(max===def&&def-atk>15){type="防禦型";tc="#378ADD";}else if(max===dur&&dur-atk>15){type="持久型";tc="#1D9E75";}
  const sb=document.getElementById("score-badge");sb.textContent=score+" 分・"+type;sb.style.color=tc;sb.style.borderColor=tc+"44";
  document.getElementById("meta-row").innerHTML=`<span class="mpill">⚖ ${w}g</span>`;
}

function rebuild(){
  thumbAnims=[];
  buildDD("cs-blade",BLADES,"blade",selB,i=>{selB=i;rebuild();});
  buildDD("cs-ratchet",RATCHETS,"ratchet",selR,i=>{selR=i;rebuild();});
  buildDD("cs-bit",BITS,"bit",selBit,i=>{selBit=i;rebuild();});
  updateStats();startThumbAnim();
}

initCanvas();rebuild();
</script>
